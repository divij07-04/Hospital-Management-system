{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — CURA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/cura.css' %}" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon"><i class="bi bi-heart-pulse"></i></div>
                <h2>CURA</h2>
                <p>Welcome back! Your team is waiting.</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger cura-alert mb-4" role="alert">
                <i class="bi bi-exclamation-triangle"></i>
                <span>Hmm, that didn't work. Please check your username and password.</span>
            </div>
            {% endif %}

            <form method="post" id="login-form">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-cura w-100 btn-lg" id="login-submit-btn">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'home' %}" class="text-muted" style="font-size:0.82rem;">
                    <i class="bi bi-arrow-left me-1"></i>Back to home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
